<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Stephen D. Gardner — AI Product Founder · Federal Data Science Leader · Navy Veteran">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="45%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6f42c1"/>
      <stop offset="50%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#6f42c1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6f42c1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <g opacity="0.6">
    <circle cx="1020" cy="90"  r="2.5" fill="#6f42c1"/>
    <circle cx="1080" cy="130" r="1.8" fill="#1f6feb"/>
    <circle cx="1140" cy="80"  r="2.2" fill="#2ea043"/>
    <circle cx="990"  cy="180" r="1.6" fill="#bf3989"/>
    <circle cx="1100" cy="220" r="2.0" fill="#6f42c1"/>
    <circle cx="1050" cy="260" r="1.4" fill="#1f6feb"/>
    <line x1="1020" y1="90"  x2="1080" y2="130" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="1080" y1="130" x2="1140" y2="80"  stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="1080" y1="130" x2="990"  y2="180" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="990"  y1="180" x2="1100" y2="220" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="1100" y1="220" x2="1050" y2="260" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  </g>

  <rect x="60" y="80" width="4" height="60" fill="url(#accent)" rx="2"/>

  <text x="80" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#8b949e" letter-spacing="3">
    AI PRODUCT FOUNDER · FEDERAL DATA SCIENCE LEADER · NAVY VETERAN
  </text>

  <text x="60" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Stephen D. Gardner
  </text>

  <text x="60" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#c9d1d9">
    Shipping GenAI, agentic AI, and LLM-evaluated products
  </text>
  <text x="60" y="254" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#c9d1d9">
    from the IC to K–12 classrooms.
  </text>

  <g transform="translate(60, 280)">
    <circle cx="6" cy="6" r="4" fill="#2ea043">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="20" y="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#2ea043">
      BUILDING NOW
    </text>
    <text x="135" y="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#c9d1d9">
      explanova.ai — family STEM homework copilot · live in production
    </text>
  </g>

  <rect x="0" y="316" width="1200" height="4" fill="url(#accent)"/>
</svg>
